version: '3'

# Local + example env. The DEFAULT example stack is cheap + hosted (Jina embed/
# rerank + Gemini LLM + LocalFs storage), so `task local:example` needs no
# containers and no GPU — it just reads secrets from the vsync vault.
#
# Heavier all-local options stay opt-in:
#   - MinIO (compose default profile)     the real S3 backend
#   - infinity (compose `models` profile) bge-m3 embed + bge-reranker on one port
#   - Ollama (host)                       a local answering LLM
#
# Secrets: `infra/vault/dev/.env.dev`, managed by vsync (encrypted on S3).
#   vsync pull dev    # fetch + decrypt the vault before running
#   vsync push dev    # after editing secrets

tasks:
  example:
    desc: Run the end-to-end example — ingest -> ask -> evaluate (hosted stack, no infra)
    dir: example
    dotenv: ['../infra/vault/dev/.env.dev']
    cmds:
      - uv run python run.py

  # --- MinIO (local S3) --------------------------------------------------------
  minio:up:
    desc: Start local MinIO (S3) and auto-create the bucket
    cmds:
      - docker compose up -d
      - 'echo "MinIO S3 API : http://localhost:${MINIO_API_PORT:-19000}"'
      - 'echo "MinIO console: http://localhost:${MINIO_CONSOLE_PORT:-19001}  (minioadmin / minioadmin)"'
      - 'echo "Bucket       : ${TRUSTRAG_BUCKET:-trustrag-local}"'

  minio:down:
    desc: Stop local MinIO (keeps the data volume)
    cmds:
      - docker compose down

  minio:reset:
    desc: Stop local MinIO and DELETE its data volume
    cmds:
      - docker compose down -v

  minio:logs:
    desc: Tail MinIO logs
    cmds:
      - docker compose logs -f minio

  # --- Postgres + pgvector (the second VectorStore backend) --------------------
  postgres:up:
    desc: Start Postgres+pgvector (the alternative VectorStore backend)
    cmds:
      - docker compose --profile postgres up -d postgres
      - 'echo "Postgres DSN : postgresql://trustrag:trustrag@localhost:${TRUSTRAG_PG_PORT:-15432}/trustrag"'

  postgres:down:
    desc: Stop Postgres (keeps the data volume)
    cmds:
      - docker compose --profile postgres down

  # --- infinity (local embed + rerank on one OpenAI-compatible port) -----------
  models:up:
    desc: Start infinity (bge-m3 embeddings + bge-reranker-v2-m3) on one OpenAI-compatible port
    cmds:
      - docker compose --profile models up -d infinity
      - 'echo "infinity API : http://localhost:${INFINITY_PORT:-17997}  (/v1/embeddings + /rerank)"'
      - 'echo "first boot downloads model weights — watch: task local:models:logs"'

  models:down:
    desc: Stop the infinity model server (keeps the weights cache)
    cmds:
      - docker compose --profile models down

  models:logs:
    desc: Tail infinity logs (watch the first-boot model download)
    cmds:
      - docker compose --profile models logs -f infinity

  up:
    desc: Start the full local stack — MinIO (S3) + infinity (embed/rerank)
    cmds:
      - docker compose --profile models up -d
      - 'echo "MinIO S3 API : http://localhost:${MINIO_API_PORT:-19000}"'
      - 'echo "infinity API : http://localhost:${INFINITY_PORT:-17997}"'
      - 'echo "LLM          : start host Ollama separately (task local:ollama:up)"'

  ollama:up:
    desc: Pull the models the all-local example expects (bge-m3, qwen2.5, bge-reranker)
    cmds:
      - ollama pull bge-m3
      - ollama pull qwen2.5
      - ollama pull xitao/bge-reranker-v2-m3
