name: release

# Tag-triggered publish to PyPI via OIDC trusted publishing (no API token).
# Gated on the test job — publish only happens if the gate is green.
# Dist-name is "trustrag-ai" (import stays `trustrag`; see ADR-0003). Register
# the PyPI trusted publisher for project "trustrag-ai" (this repo, this
# workflow file, environment "pypi") before pushing the first real tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build
        run: uv build

      - name: Publish (trusted publishing)
        run: uv publish
