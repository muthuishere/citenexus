name: release

# Tag-triggered publish via OIDC trusted publishing (no API tokens):
#   - PyPI  → project "citenexus" (environment "pypi")
#   - npm   → "@muthuishere/citenexus-core" (trusted publisher: this repo + release.yml)
# Both gated on the test job. Crates.io + the Go tag + native libs are separate
# (native-libs.yml builds the cross-platform Rust cdylibs on the same tag).
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # required for actions/checkout (job-level block replaces the default)
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build
        run: uv build
        working-directory: python

      - name: Publish (trusted publishing)
        run: uv publish
        working-directory: python

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing to npm (no token)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        # Pin to 11.5.1: npm@latest ships a broken provenance path that fails to
        # load its bundled `sigstore` module on the runner (MODULE_NOT_FOUND).
        # The OIDC publish path loads sigstore regardless of --provenance, so the
        # version pin — not the flag — is the actual fix.
        run: npm install -g npm@11.5.1
      - name: Install + publish (trusted publishing)
        working-directory: js
        # --provenance dropped: npm@latest's provenance path fails to load the
        # bundled `sigstore` module on the runner (MODULE_NOT_FOUND). OIDC trusted
        # publishing itself does not need provenance. Re-add once a known-good npm
        # version with a working provenance path is pinned.
        run: |
          npm ci
          npm publish --access public
