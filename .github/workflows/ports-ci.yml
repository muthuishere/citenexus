name: ports-ci

# The Go + TS + Rust ports prove the SPEC-PORTS-v1 §4 deterministic contract
# against the shared conformance/ fixtures. Runs when a port or the fixtures
# change (a fixture edit must break any drifting port). Actions pinned to SHAs.
on:
  pull_request:
    paths:
      - "golang/**"
      - "js/**"
      - "rust/**"
      - "conformance/**"
      - ".github/workflows/ports-ci.yml"
  push:
    branches: [main]
    paths:
      - "golang/**"
      - "js/**"
      - "rust/**"
      - "conformance/**"
      - ".github/workflows/ports-ci.yml"

permissions:
  contents: read

concurrency:
  group: ports-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: false # pure-stdlib module, no go.sum to key a cache on
      - name: Vet
        run: cd golang && go vet ./...
      - name: Conformance tests
        run: cd golang && go test ./...

  ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: js/package-lock.json
      - name: Install
        run: cd js && npm ci
      - name: Typecheck
        run: cd js && npm run typecheck
      - name: Conformance tests
        run: cd js && npm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build + test
        run: cd rust && cargo test
