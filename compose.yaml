name: trustrag-local

# Local S3 (MinIO) so the S3-native storage layer (L2+), the runnable example,
# and the opt-in integration tests have a real backend to talk to.
# Ports use a high range (19000/19001) to isolate this stack from any other
# MinIO running on the default 9000 (kernel: test stacks get their own ports).
# Images pinned by digest (latest as of 2026-06-26).
#
# Two profiles:
#   (default)  minio + createbuckets  — the S3 backend, always started.
#   models     infinity               — bge-m3 embeddings + bge-reranker-v2-m3
#              behind ONE OpenAI-compatible port :17997, so the "real reranker"
#              path needs no host GPU. Started only with `--profile models`
#              (task local:models:up). The answering LLM stays on host Ollama.

services:
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  # One-shot: wait for MinIO, then create the default bucket (idempotent).
  createbuckets:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TRUSTRAG_BUCKET: ${TRUSTRAG_BUCKET:-trustrag-local}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing \"local/$$TRUSTRAG_BUCKET\";
      echo \"bucket $$TRUSTRAG_BUCKET ready\";
      "

  # Postgres + pgvector — the second VectorStore backend (opt-in profile).
  # High port 15432 isolates it from any local Postgres on 5432.
  postgres:
    profiles: ["postgres"]
    image: pgvector/pgvector@sha256:dd467f03ca5c5581222490e5217e48a262864ccb659be559f8491bbafdc97da0
    environment:
      POSTGRES_USER: ${TRUSTRAG_PG_USER:-trustrag}
      POSTGRES_PASSWORD: ${TRUSTRAG_PG_PASSWORD:-trustrag}
      POSTGRES_DB: ${TRUSTRAG_PG_DB:-trustrag}
    ports:
      - "${TRUSTRAG_PG_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Embedding + reranker behind one OpenAI-compatible port (opt-in profile).
  # infinity serves bge-m3 (/v1/embeddings) and bge-reranker-v2-m3 (/rerank);
  # first boot downloads the model weights into the cache volume.
  infinity:
    profiles: ["models"]
    image: michaelf34/infinity:0.0.76
    command: >
      v2
      --model-id BAAI/bge-m3
      --model-id BAAI/bge-reranker-v2-m3
      --port 7997
    environment:
      HF_HOME: /cache
    ports:
      - "${INFINITY_PORT:-17997}:7997"
    volumes:
      - infinity-cache:/cache
    restart: unless-stopped

volumes:
  minio-data:
  infinity-cache:
  postgres-data:
